backend:
  name: git-gateway
  branch: main

# After deploying to Netlify, enable Identity + Git Gateway in the Netlify
# site dashboard (Site configuration > Identity, and Identity > Services >
# Git Gateway), then invite editors as Identity users. See HANDOFF.md.

logo_url: /images/brand/logo.svg
publish_mode: simple
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site"
    label: "Site Settings"
    description: "Company details, homepage headline, contact info and the stats/reasons shown on the homepage."
    files:
      - name: "site"
        label: "Company Info & Homepage"
        file: "content/site.json"
        fields:
          - {
              label: "Company Name",
              name: "companyName",
              widget: "string",
              hint: "Shown in the header, footer and browser tab.",
            }
          - {
              label: "Legal Name",
              name: "legalName",
              widget: "string",
              hint: "Full registered company name, used in the copyright line.",
            }
          - {
              label: "Founded (Year)",
              name: "founded",
              widget: "number",
              value_type: "int",
            }
          - {
              label: "Tagline",
              name: "tagline",
              widget: "string",
              hint: "Small line above the big homepage headline, e.g. \"Specialising in...\".",
            }
          - {
              label: "Hero Heading",
              name: "heroHeading",
              widget: "string",
              hint: "The big headline on the homepage.",
            }
          - {
              label: "Hero Subheading",
              name: "heroSubheading",
              widget: "text",
              hint: "The paragraph under the big homepage headline. Also used as the page description for Google.",
            }
          - {
              label: "Phone (display)",
              name: "phone",
              widget: "string",
              hint: "How the phone number is shown to visitors, e.g. \"01689 810802\".",
            }
          - {
              label: "Phone (click-to-call link)",
              name: "phoneHref",
              widget: "string",
              hint: "Same number, no spaces, e.g. \"tel:01689810802\" — this is what makes the phone number clickable on mobiles.",
            }
          - { label: "Email", name: "email", widget: "string" }
          - {
              label: "LinkedIn URL",
              name: "linkedin",
              widget: "string",
              hint: "Full link starting with https://",
            }
          - label: "Offices"
            name: "offices"
            widget: "list"
            label_singular: "Office"
            summary: "{{fields.name}}"
            fields:
              - {
                  label: "Office Name",
                  name: "name",
                  widget: "string",
                  hint: "e.g. \"Head Office\" or \"London Office\"",
                }
              - { label: "Town", name: "town", widget: "string" }
              - label: "Address Lines"
                name: "address"
                widget: "list"
                hint: "One line of the address per entry — building, street, town, postcode."
                field: { label: "Line", name: "line", widget: "string" }
          - label: "Client Names (scrolling strip)"
            name: "clients"
            widget: "list"
            hint: "Shown in the moving \"trusted by\" strip under the homepage banner."
            field: { label: "Client", name: "client", widget: "string" }
          - label: "Homepage Stats"
            name: "stats"
            widget: "list"
            label_singular: "Stat"
            summary: "{{fields.value}} — {{fields.label}}"
            hint: "The row of 4 numbers near the top of the homepage (e.g. \"40+ years of experience\")."
            fields:
              - {
                  label: "Value",
                  name: "value",
                  widget: "string",
                  hint: "The big number, e.g. \"40+\" or \"2006\"",
                }
              - {
                  label: "Label",
                  name: "label",
                  widget: "string",
                  hint: "The small text underneath the number.",
                }
              - &icon_field
                label: "Icon"
                name: "icon"
                widget: "select"
                hint: "The small icon shown with this item."
                options: &icon_options
                  - { label: "Lightbulb (lighting)", value: "lightbulb" }
                  - { label: "Shield Check (certified/safety)", value: "shield-check" }
                  - { label: "Clipboard (survey/design)", value: "clipboard" }
                  - { label: "Network (data/IT)", value: "network" }
                  - { label: "Flame (fire alarm)", value: "flame" }
                  - { label: "Clock (experience/years)", value: "clock" }
                  - { label: "Calendar (founded/date)", value: "calendar" }
                  - { label: "Award (recognition)", value: "award" }
                  - { label: "Users (team/people)", value: "users" }
                  - { label: "Building (offices/commercial)", value: "building" }
                  - { label: "Map Pin (location)", value: "map-pin" }
                  - { label: "Phone (contact)", value: "phone" }
                  - { label: "Mail (email)", value: "mail" }
                  - { label: "Check Circle (general tick)", value: "check" }
                  - { label: "Zap (electrical/power)", value: "zap" }
                  - { label: "Wrench (installation)", value: "wrench" }
                  - { label: "Hard Hat (site work)", value: "hard-hat" }
                  - { label: "Ruler (design/measurement)", value: "ruler" }
                  - { label: "Certificate (documentation)", value: "certificate" }
                  - { label: "Graduation Cap (training)", value: "graduation-cap" }
          - label: "Why Choose Us"
            name: "whyChooseUs"
            widget: "list"
            label_singular: "Reason"
            summary: "{{fields.title}}"
            hint: "The 3 numbered reason cards on the homepage."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - *icon_field
          - {
              label: "Recognition line",
              name: "recognition",
              widget: "string",
              hint: "Not currently shown on a page, kept for future use.",
            }
          - {
              label: "Footer Note",
              name: "footerNote",
              widget: "string",
              hint: "Small line in the very bottom bar of the site, next to the copyright.",
            }

  - name: "about"
    label: "About Page"
    description: "Content for the /about page — company history, values and the award mention."
    files:
      - name: "about"
        label: "About Page Content"
        file: "content/about.json"
        fields:
          - {
              label: "Heading",
              name: "heading",
              widget: "string",
              hint: "The big title at the top of the About page.",
            }
          - { label: "Intro", name: "intro", widget: "text" }
          - {
              label: "Approach",
              name: "approach",
              widget: "text",
              hint: "\"Our approach\" paragraph.",
            }
          - {
              label: "Values",
              name: "values",
              widget: "text",
              hint: "\"What we value\" paragraph.",
            }
          - { label: "Recognition Heading", name: "recognitionHeading", widget: "string" }
          - {
              label: "Recognition Body",
              name: "recognitionBody",
              widget: "text",
              hint: "The Small Awards recognition callout box.",
            }
          - label: "Company Timeline"
            name: "milestones"
            widget: "list"
            label_singular: "Milestone"
            summary: "{{fields.year}} — {{fields.title}}"
            hint: "The \"Our Story\" timeline on the About page, oldest first."
            fields:
              - {
                  label: "Year",
                  name: "year",
                  widget: "string",
                  hint: "e.g. \"2006\", \"2017\" or \"Today\"",
                }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }

  - name: "training"
    label: "Training & Apprenticeships Page"
    description: "Content for the /training-apprenticeships page."
    files:
      - name: "training"
        label: "Training Page Content"
        file: "content/training.json"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Intro", name: "intro", widget: "text" }
          - { label: "Body", name: "body", widget: "text" }
          - {
              label: "Call To Action",
              name: "cta",
              widget: "text",
              hint: "Text inside the shaded box that invites people to apply.",
            }

  - name: "team"
    label: "Team"
    description: "People shown on the About page. Everyone gets a coloured initials badge instead of a photo, so you only need a name and role — no image to upload or resize."
    files:
      - name: "team"
        label: "Leadership & Site Team"
        file: "content/team.json"
        fields:
          - label: "Leadership"
            name: "leadership"
            widget: "list"
            label_singular: "Person"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
          - label: "Site Managers"
            name: "siteManagers"
            widget: "list"
            label_singular: "Person"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
          - {
              label: "Office Team Note",
              name: "officeTeamNote",
              widget: "text",
              hint: "Sentence under the Site Managers grid about the rest of the office team.",
            }

  - name: "services"
    label: "Services"
    description: "The 5 services listed on the homepage and the /services page. Reorder by dragging; add or remove as needed."
    files:
      - name: "services"
        label: "Services List"
        file: "content/services.json"
        fields:
          - name: "services"
            label: "Services"
            widget: "list"
            top_level_label: false
            label_singular: "Service"
            summary: "{{fields.title}}"
            fields:
              - {
                  label: "Slug",
                  name: "slug",
                  widget: "string",
                  hint: "Internal ID only, not shown to visitors. Lowercase, words separated by dashes, e.g. \"fire-alarm-services\". Must be unique.",
                  pattern:
                    ["^[a-z0-9]+(-[a-z0-9]+)*$", "Lowercase letters, numbers and dashes only, no spaces"],
                }
              - {
                  label: "Title",
                  name: "title",
                  widget: "string",
                  hint: "Shown as the service name.",
                }
              - {
                  label: "Short Summary",
                  name: "summary",
                  widget: "text",
                  hint: "One sentence, shown on the homepage service cards.",
                }
              - {
                  label: "Full Description",
                  name: "body",
                  widget: "text",
                  hint: "Longer paragraph, shown on the Services page.",
                }
              - *icon_field

  - name: "projects"
    label: "Projects"
    description: "The project gallery shown on the homepage and /projects page. Reorder by dragging; add or remove as needed."
    files:
      - name: "projects"
        label: "Projects List"
        file: "content/projects.json"
        fields:
          - name: "projects"
            label: "Projects"
            widget: "list"
            top_level_label: false
            label_singular: "Project"
            summary: "{{fields.name}}"
            fields:
              - {
                  label: "Slug",
                  name: "slug",
                  widget: "string",
                  hint: "Internal ID only, not shown to visitors. Lowercase, words separated by dashes, e.g. \"paddy-power\". Must be unique.",
                  pattern:
                    ["^[a-z0-9]+(-[a-z0-9]+)*$", "Lowercase letters, numbers and dashes only, no spaces"],
                }
              - {
                  label: "Project Name",
                  name: "name",
                  widget: "string",
                  hint: "The client or project name, shown on the card.",
                }
              - {
                  label: "Category",
                  name: "category",
                  widget: "string",
                  hint: "Small tag above the project name, e.g. \"Office Fit-Out\".",
                }
              - { label: "Summary", name: "summary", widget: "text" }
              - {
                  label: "Image",
                  name: "image",
                  widget: "image",
                  hint: "Landscape photo works best (roughly 4:3, e.g. 1200x900px or similar). Click to upload a new one.",
                }
